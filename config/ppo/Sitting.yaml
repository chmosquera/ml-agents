behaviors:
  PushBlock:
    # The trainer_type must be explicitly stated (e.g., ppo or sac).
    trainer_type: ppo

    # Main training parameters
    max_steps: 5.0e10    # <--- Increase or decrease as needed
    time_horizon: 64
    summary_freq: 10000

    # Default hyperparameters for PPO
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3

    # Default network settings
    network_settings:
      num_layers: 2
      hidden_units: 128

    # Basic reward signal
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
